<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <rect width="640" height="340" fill="#fafafa" rx="12"/>
  <text x="24" y="34" font-size="16" font-weight="600" fill="#18181b">Claude API pricing — $ per million tokens</text>
  <g font-size="12" fill="#52525b">
    <rect x="420" y="18" width="12" height="12" fill="#93c5fd" rx="2"/>
    <text x="438" y="28">Input</text>
    <rect x="490" y="18" width="12" height="12" fill="#2563eb" rx="2"/>
    <text x="508" y="28">Output</text>
  </g>
  <line x1="40" y1="290" x2="616" y2="290" stroke="#d4d4d8" stroke-width="1"/>

  <!-- Fable 5: $10 in / $50 out -->
  <rect x="70" y="246" width="36" height="44" fill="#93c5fd" rx="3"/>
  <rect x="112" y="70" width="36" height="220" fill="#2563eb" rx="3"/>
  <text x="88" y="240" font-size="12" fill="#52525b" text-anchor="middle">$10</text>
  <text x="130" y="64" font-size="12" fill="#52525b" text-anchor="middle">$50</text>
  <text x="109" y="312" font-size="13" font-weight="600" fill="#18181b" text-anchor="middle">Fable 5</text>

  <!-- Opus 4.8: $5 / $25 -->
  <rect x="205" y="268" width="36" height="22" fill="#93c5fd" rx="3"/>
  <rect x="247" y="180" width="36" height="110" fill="#2563eb" rx="3"/>
  <text x="223" y="262" font-size="12" fill="#52525b" text-anchor="middle">$5</text>
  <text x="265" y="174" font-size="12" fill="#52525b" text-anchor="middle">$25</text>
  <text x="244" y="312" font-size="13" font-weight="600" fill="#18181b" text-anchor="middle">Opus 4.8</text>

  <!-- Sonnet 4.6: $3 / $15 -->
  <rect x="340" y="277" width="36" height="13" fill="#93c5fd" rx="3"/>
  <rect x="382" y="224" width="36" height="66" fill="#2563eb" rx="3"/>
  <text x="358" y="271" font-size="12" fill="#52525b" text-anchor="middle">$3</text>
  <text x="400" y="218" font-size="12" fill="#52525b" text-anchor="middle">$15</text>
  <text x="379" y="312" font-size="13" font-weight="600" fill="#18181b" text-anchor="middle">Sonnet 4.6</text>

  <!-- Haiku 4.5: $1 / $5 -->
  <rect x="475" y="286" width="36" height="4" fill="#93c5fd" rx="2"/>
  <rect x="517" y="268" width="36" height="22" fill="#2563eb" rx="3"/>
  <text x="493" y="280" font-size="12" fill="#52525b" text-anchor="middle">$1</text>
  <text x="535" y="262" font-size="12" fill="#52525b" text-anchor="middle">$5</text>
  <text x="514" y="312" font-size="13" font-weight="600" fill="#18181b" text-anchor="middle">Haiku 4.5</text>

  <text x="24" y="332" font-size="11" fill="#a1a1aa">Source: Anthropic API pricing, June 2026</text>
</svg>
